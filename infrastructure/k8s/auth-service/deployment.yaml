apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: distributed-app
  labels:
    app: auth-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0    # ← 0 pod indisponible pendant le rollout
      maxSurge: 1          # ← 1 pod supplémentaire pendant la transition
  template:
    metadata:
      labels:
        app: auth-service
        version: v1
    spec:
      # Attendre que postgres soit prêt avant de démarrer
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-auth 5432; do
                echo "Attente de postgres-auth:5432..."
                sleep 2
              done
              echo "postgres-auth prêt."
      containers:
        - name: django
          # ⚠️  Remplacer latest par le SHA du commit en prod
          # ex: capedev/auth-service:a3f2c1d
          image: capedev/auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: auth-config
            - secretRef:
                name: auth-secret
          # startupProbe : laisse le temps aux migrations de se terminer
          startupProbe:
            httpGet:
              path: /health/
              port: 8000
            failureThreshold: 30   # 30 × 5s = 150s max au démarrage
            periodSeconds: 5
          # readinessProbe : enlève le pod du LB s'il ne répond pas
          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          # livenessProbe : redémarre le pod s'il est bloqué
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"