---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: auth-ingress
  namespace: distributed-app
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`distributed-app.local`) && PathPrefix(`/api/auth`)
      kind: Rule
      middlewares:
        - name: strip-auth
      services:
        - name: auth-service
          port: 8000

