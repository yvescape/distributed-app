apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-interation-pvc
  namespace: distributed-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-interation
  namespace: distributed-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-interation
  template:
    metadata:
      labels:
        app: postgres-interation
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: "interation_db"
            - name: POSTGRES_USER
              value: "interation_user"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: interation-secret
                  key: DB_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "interation_user", "-d", "interation_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "interation_user"]
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-interation-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-interation
  namespace: distributed-app
spec:
  selector:
    app: postgres-interation
  ports:
    - port: 5432
      targetPort: 5432