services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payement_db
      POSTGRES_USER: payement_user
      POSTGRES_PASSWORD: pass_auth
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payement_user -d payement_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  django:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Hot-reload en dev : monter le code source
      - ./payement:/app/payement

volumes:
  postgres_data: