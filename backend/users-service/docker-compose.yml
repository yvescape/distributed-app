services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: pass_auth
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  django:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8001:8000"           # ← port différent de payment-service (8000)
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./auth:/app/config    # ← pointe vers /app/config, là où le code est

volumes:
  postgres_data: