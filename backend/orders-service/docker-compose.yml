services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: pass_order
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Décommentez pour déboguer depuis votre machine
    # ports:
    #   - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user -d order_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - orders_network

  django:
    build:
      context: .
      dockerfile: Dockerfile
    image: capedev/orders-service:latest
    container_name: orders
    env_file:
      - .env.docker
    environment:
      DB_HOST: postgres
      DJANGO_SETTINGS_MODULE: orders.settings.base
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./orders:/app/orders
    networks:
      - orders_network
      - microservices-net

networks:
  orders_network:
    driver: bridge
  microservices-net:
    name: microservices-net
    driver: bridge

volumes:
  postgres_data: