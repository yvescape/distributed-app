name: Frontend — CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'frontend/e-commerce/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/e-commerce/**'
  workflow_dispatch:

env:
  SERVICE_NAME: frontend
  SERVICE_PATH: frontend/e-commerce
  IMAGE_NAME: capedev/e-commerce-frontend
  GITOPS_DEPLOYMENT_PATH: apps/production/frontend/deployment.yaml

jobs:
  # ── 1. Lint + Tests unitaires & intégration ─────────────────────────
  test-unit:
    name: Tests unitaires & intégration
    runs-on: self-hosted
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ env.SERVICE_PATH }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_PATH }}
        run: npm ci --quiet

      - name: Lint
        working-directory: ${{ env.SERVICE_PATH }}
        run: npm run lint

      - name: Tests unitaires & intégration (avec couverture)
        working-directory: ${{ env.SERVICE_PATH }}
        run: npm run test:coverage

      - name: Upload rapport de couverture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ env.SERVICE_PATH }}/coverage/
          retention-days: 7

  # ── 2. Tests E2E (Playwright) ────────────────────────────────────────
  test-e2e:
    name: Tests E2E (Playwright)
    runs-on: self-hosted
    needs: test-unit
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ env.SERVICE_PATH }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_PATH }}
        run: npm ci --quiet

      - name: Install Playwright + navigateurs
        working-directory: ${{ env.SERVICE_PATH }}
        run: npx playwright install chromium --with-deps

      - name: Tests E2E
        working-directory: ${{ env.SERVICE_PATH }}
        run: npx playwright test

      - name: Upload rapport Playwright (échec uniquement)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ${{ env.SERVICE_PATH }}/playwright-report/
          retention-days: 7

  # ── 3. Build & Push Docker image ─────────────────────────────────────
  build:
    name: Build & Push Docker image
    runs-on: self-hosted
    needs: [test-unit, test-e2e]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v5

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build image
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          docker build \
            -f Dockerfile \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .

      - name: Scan image with Trivy
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            --format table \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Push image
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

  # ── 4. Update gitops-repo ────────────────────────────────────────────
  deploy:
    name: Update gitops-repo
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout gitops-repo
        uses: actions/checkout@v5
        with:
          repository: yvescape/gitops-repo
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops-repo

      - name: Update image tag and push
        run: |
          cd gitops-repo
          sed -i "s|${{ env.IMAGE_NAME }}:.*|${{ env.IMAGE_NAME }}:${{ github.sha }}|" \
            ${{ env.GITOPS_DEPLOYMENT_PATH }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.GITOPS_DEPLOYMENT_PATH }}
          if git diff --cached --quiet; then
            echo "No changes to commit — image tag unchanged"
          else
            git commit -m "ci(${{ env.SERVICE_NAME }}): bump image to ${{ github.sha }}"
            git push
          fi