name: Auth Service — CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/users-service/**'
      - '.github/workflows/auth-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/users-service/**'
  workflow_dispatch:

env:
  SERVICE_NAME: auth-service
  SERVICE_PATH: backend/users-service
  DJANGO_PROJECT: auth
  IMAGE_NAME: capedev/auth-service
  GITOPS_DEPLOYMENT_PATH: apps/production/auth-service/deployment.yaml

jobs:
  # ── 1. Tests unitaires ─────────────────────────────────────────────
  test-unit:
    name: Tests unitaires
    runs-on: self-hosted
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip --quiet

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          source venv/bin/activate
          pip install -r requirements.txt --quiet

      - name: Run unit tests
        working-directory: ${{ env.SERVICE_PATH }}/${{ env.DJANGO_PROJECT }}
        run: |
          source ../venv/bin/activate
          pytest -m unit --tb=short -v --junitxml=test-unit-results.xml

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SERVICE_NAME }}-unit-tests
          path: ${{ env.SERVICE_PATH }}/${{ env.DJANGO_PROJECT }}/test-unit-results.xml
          retention-days: 7

  # ── 2. Tests d'intégration ─────────────────────────────────────────
  test-integration:
    name: Tests d'intégration
    runs-on: self-hosted
    needs: test-unit
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip --quiet

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          source venv/bin/activate
          pip install -r requirements.txt --quiet

      - name: Run integration tests
        working-directory: ${{ env.SERVICE_PATH }}/${{ env.DJANGO_PROJECT }}
        run: |
          source ../venv/bin/activate
          pytest -m integration --tb=short -v --junitxml=test-integration-results.xml || true

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SERVICE_NAME }}-integration-tests
          path: ${{ env.SERVICE_PATH }}/${{ env.DJANGO_PROJECT }}/test-integration-results.xml
          retention-days: 7

  # ── 3. Build & Push Docker image ────────────────────────────────────
  build:
    name: Build & Push Docker image
    runs-on: self-hosted
    needs: [test-unit, test-integration]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v5

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build image
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          docker build \
            -f dockerfile \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .

      - name: Scan image with Trivy
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            --format table \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Push image
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

  # ── 4. Update gitops-repo ────────────────────────────────────────────
  deploy:
    name: Update gitops-repo
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout gitops-repo
        uses: actions/checkout@v5
        with:
          repository: yvescape/gitops-repo
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops-repo

      - name: Update image tag and push
        run: |
          cd gitops-repo
          sed -i "s|${{ env.IMAGE_NAME }}:.*|${{ env.IMAGE_NAME }}:${{ github.sha }}|" \
            ${{ env.GITOPS_DEPLOYMENT_PATH }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.GITOPS_DEPLOYMENT_PATH }}
          if git diff --cached --quiet; then
            echo "No changes to commit — image tag unchanged"
          else
            git commit -m "ci(${{ env.SERVICE_NAME }}): bump image to ${{ github.sha }}"
            git push
          fi