name: Review Service — CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/review-service/**'
      - '.github/workflows/review-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/review-service/**'
  workflow_dispatch:

env:
  SERVICE_NAME: review-service
  SERVICE_PATH: backend/review-service
  DJANGO_PROJECT: interation
  IMAGE_NAME: capedev/review-service
  GITOPS_DEPLOYMENT_PATH: apps/production/review-service/deployment.yaml

# ── Bloc réutilisable pour setup Python + cache ──────────────────────
# (GitHub Actions ne supporte pas les vrais YAML anchors, on duplique
#  le step mais en gardant la clé de cache identique)

jobs:
  # ── 1 & 2. Tests en parallèle ──────────────────────────────────────
  test-unit:
    name: Tests unitaires
    runs-on: self-hosted
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Setup Python & install deps
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip --quiet
          pip install -r requirements.txt --quiet

      - name: Run unit tests
        working-directory: ${{ env.SERVICE_PATH }}/${{ env.DJANGO_PROJECT }}
        run: |
          source ../venv/bin/activate
          pytest -m unit --tb=short -v --junitxml=test-unit-results.xml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SERVICE_NAME }}-unit-tests
          path: ${{ env.SERVICE_PATH }}/${{ env.DJANGO_PROJECT }}/test-unit-results.xml
          retention-days: 7

  test-integration:
    name: Tests d'intégration
    runs-on: self-hosted
    # Pas de `needs: test-unit` → parallèle !
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Setup Python & install deps
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip --quiet
          pip install -r requirements.txt --quiet

      - name: Run integration tests
        working-directory: ${{ env.SERVICE_PATH }}/${{ env.DJANGO_PROJECT }}
        run: |
          source ../venv/bin/activate
          pytest -m integration --tb=short -v --junitxml=test-integration-results.xml || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SERVICE_NAME }}-integration-tests
          path: ${{ env.SERVICE_PATH }}/${{ env.DJANGO_PROJECT }}/test-integration-results.xml
          retention-days: 7

  # ── 3. Build & Push ────────────────────────────────────────────────
  build:
    name: Build & Push Docker image
    runs-on: self-hosted
    needs: [test-unit, test-integration]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICE_PATH }}
          file: ${{ env.SERVICE_PATH }}/dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          # Cache BuildKit sur le runner self-hosted (disque local)
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Évite la croissance infinie du cache sur le runner
      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Scan image with Trivy
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            --format table \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ── 4. Deploy gitops ───────────────────────────────────────────────
  deploy:
    name: Update gitops-repo
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout gitops-repo
        uses: actions/checkout@v4
        with:
          repository: yvescape/gitops-repo
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops-repo

      - name: Update image tag and push
        run: |
          cd gitops-repo
          sed -i "s|${{ env.IMAGE_NAME }}:.*|${{ env.IMAGE_NAME }}:${{ github.sha }}|" \
            ${{ env.GITOPS_DEPLOYMENT_PATH }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.GITOPS_DEPLOYMENT_PATH }}
          if git diff --cached --quiet; then
            echo "No changes to commit — image tag unchanged"
          else
            git commit -m "ci(${{ env.SERVICE_NAME }}): bump image to ${{ github.sha }}"
            git push
          fi