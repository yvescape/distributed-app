server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # SPA : toutes les routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache les assets statiques
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}